name: API Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      pytest_args:
        description: "Pytest arguments"
        required: false
        default: "-m smoke"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      PYTEST_ARGS: ${{ inputs.pytest_args || '-m smoke' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t simple-api-tests .

      - name: Run tests in Docker
        run: |
          mkdir -p allure-results
          docker run --rm \
            -e BASE_URL="$BASE_URL" \
            -v "$PWD/allure-results:/app/allure-results" \
            simple-api-tests \
            pytest $PYTEST_ARGS --alluredir=allure-results --clean-alluredir

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Setup Java for Allure
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate Allure HTML report
        if: always()
        run: npx --yes allure-commandline generate allure-results -o allure-report --clean

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Configure Pages
        if: always()
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload report to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-pages:
    needs: tests
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
